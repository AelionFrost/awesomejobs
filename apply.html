<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){try{var t=localStorage.getItem('aj-theme');if(!t) t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Apply — AwesomeJobs</title>
<meta name="robots" content="noindex">
<style>
:root{--bg:#f8fafc;--bg-alt:#f1f5f9;--surface:#fff;--text:#0f172a;--text2:#475569;--muted:#94a3b8;--border:#e2e8f0;--accent:#2563eb;--green:#059669;--radius:10px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
[data-theme="dark"]{--bg:#0f172a;--bg-alt:#1e293b;--surface:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--muted:#64748b;--border:#334155;--accent:#3b82f6;--green:#22c55e}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6}

.site-header{position:sticky;top:0;z-index:100;background:rgba(248,250,252,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
[data-theme="dark"] .site-header{background:rgba(15,23,42,.92)}
.header-inner{max-width:1400px;margin:0 auto;padding:0 18px;height:64px;display:flex;align-items:center;gap:6px}
.logo{display:flex;align-items:center;gap:4px;text-decoration:none}
.logo img{width:80px;height:64px;object-fit:contain}
.logo-text{font-size:2rem;font-weight:800;color:var(--text);letter-spacing:-.03em}
.logo-text em{font-style:italic;color:var(--accent);font-weight:400}

.content{max-width:1400px;margin:0 auto;padding:40px 24px 60px}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
.back{font-size:.78rem;color:var(--muted);display:inline-block;margin-bottom:24px}
h1{font-size:1.35rem;font-weight:900;letter-spacing:-.03em;margin:0 0 4px;line-height:1.2}
.company{font-size:.85rem;font-weight:700;color:var(--text2);margin-bottom:10px}
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.pill{display:inline-block;padding:3px 10px;border-radius:6px;font-size:.65rem;font-weight:700}
.pill.g{background:#ecfdf5;color:var(--green)}
.pill.m{color:var(--text2);background:var(--bg)}
h2{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:20px 0 4px}
p,li{font-size:.85rem;color:var(--text2);line-height:1.6;margin:0 0 4px}
ul{padding-left:20px;margin:0 0 12px}
li{margin-bottom:3px}
.apply{margin-top:28px}
.apply a{display:inline-flex;align-items:center;gap:6px;padding:11px 22px;border-radius:8px;background:var(--accent);color:#fff;font-size:.75rem;font-weight:800}
.apply a:hover{text-decoration:none;opacity:.92}
.apply .note{font-size:.7rem;color:var(--muted);margin-top:8px}
.loading{color:var(--muted)}
.site-footer{border-top:1px solid var(--border);background:var(--bg-alt)}
.footer-inner{max-width:1400px;margin:0 auto;padding:24px;text-align:center}
.footer-inner p{font-size:.65rem;color:var(--muted)}
.footer-inner a{color:var(--accent)}

@media(max-width:768px){.content{padding:24px 16px 40px}h1{font-size:1.2rem}}
</style>
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo">
      <img src="/assets/site-logo.png" alt="">
      <span class="logo-text">Awesome<em>Jobs</em></span>
    </a>
  </div>
</header>

<main class="content" id="app"><p class="loading">Loading...</p></main>

<footer class="site-footer">
  <div class="footer-inner">
    <p>© 2026 <a href="/">AwesomeJobs.online</a> — Remote job board.</p>
  </div>
</footer>

<script>
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
(function(){
  var hash = window.location.hash.slice(1);
  if(!hash) { app.innerHTML='<a class="back" href="/">← Back</a><p>No job specified.</p>'; return; }
  fetch('/data/jobs.json?t='+Date.now(),{cache:'no-store'})
    .then(r=>r.json()).then(d=>render(d.jobs[parseInt(hash)]))
    .catch(function(){ app.innerHTML='<p>Failed to load.</p>'; });
  function render(job){
    if(!job){ app.innerHTML='<a class="back" href="/">← Back</a><p>Job not found.</p>'; return; }
    document.title = job.title+' — AwesomeJobs';
    var applyUrl = job.apply_url || job.source_url || '#';
    var pills = '';
    if(job.location) pills += '<span class="pill m">'+esc(job.location)+'</span>';
    if(job.salary) pills += '<span class="pill g">'+esc(job.salary)+'</span>';
    if(job.source) pills += '<span class="pill m">via '+esc(job.source)+'</span>';

    app.innerHTML = '<a class="back" href="javascript:history.back()">← Back to jobs</a>'+
      '<h1>'+esc(job.title)+'</h1>'+
      '<p class="company">'+esc(job.company||'Company')+'</p>'+
      '<div class="pills">'+pills+'</div>'+
      '<div id="detail"><p class="loading">Loading full details...</p></div>'+
      '<div class="apply">'+
        '<a href="'+esc(applyUrl)+'" target="_blank" rel="noopener">Apply for this position →</a>'+
        '<p class="note">You will be redirected to the employer\'s career page</p>'+
      '</div>';

    if(applyUrl && applyUrl !== '#'){
      var proxyUrl = 'http://127.0.0.1:8910/fetch?url='+encodeURIComponent(applyUrl);
      fetch(proxyUrl).then(r=>r.json()).then(function(data){
        var d = document.getElementById('detail');
        if(data.text && data.text.length > 50){
          var lines = data.text.split('\n');
          var clean = lines.filter(function(l){
            var s = l.trim();
            return s.length > 8 && !s.match(/^(Back to jobs|Apply|Search|Menu|Login|Sign|Careers|Jobs at|Skip to|Cookie|Privacy|Terms)/i);
          });
          var display = clean.slice(0, 50).join('\n');
          if(d) d.innerHTML = '<p style="white-space:pre-wrap">'+esc(display)+'</p>';
        }
      }).catch(function(){});
    }
  }
})();
</script>
</body>
</html>
