<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){try{var t=localStorage.getItem('aj-theme');if(!t) t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Apply — AwesomeJobs</title>
<meta name="robots" content="noindex">
<style>
:root{--bg:#f8fafc;--bg-alt:#f1f5f9;--surface:#fff;--text:#0f172a;--text2:#475569;--muted:#94a3b8;--border:#e2e8f0;--accent:#2563eb;--green:#16a34a;--radius:10px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
[data-theme="dark"]{--bg:#0f172a;--bg-alt:#1e293b;--surface:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--muted:#64748b;--border:#334155;--accent:#3b82f6;--green:#22c55e}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.site-header{position:sticky;top:0;z-index:100;background:rgba(248,250,252,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
[data-theme="dark"] .site-header{background:rgba(15,23,42,.92)}
.header-inner{max-width:1000px;margin:0 auto;padding:0 18px;height:64px;display:flex;align-items:center}
.logo{display:flex;align-items:center;gap:4px;text-decoration:none}
.logo img{width:64px;height:52px;object-fit:contain}
.logo-text{font-size:1.4rem;font-weight:800;color:var(--text);letter-spacing:-.03em}
.logo-text em{font-style:italic;color:var(--accent);font-weight:400}
.content{max-width:760px;margin:0 auto;padding:24px 24px 40px}
.back{display:inline-flex;align-items:center;gap:5px;font-size:.78rem;color:var(--muted);text-decoration:none;margin-bottom:16px}
.back:hover{color:var(--accent)}

.job-card{border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);overflow:hidden}
.job-card h1{font-size:1.3rem;font-weight:900;color:var(--text);padding:24px 24px 0;letter-spacing:-.02em}
.job-card .meta{padding:8px 24px 16px;font-size:.8rem;color:var(--text2);display:flex;gap:16px;flex-wrap:wrap}
.job-card .meta span{display:flex;align-items:center;gap:4px}

.tags{padding:0 24px 16px;display:flex;flex-wrap:wrap;gap:4px}
.tags span{display:inline-block;padding:4px 10px;border-radius:5px;font-size:.68rem;color:var(--text2);background:var(--bg-alt);font-weight:600}

.desc{padding:0 24px 24px;font-size:.92rem;color:var(--text2);line-height:1.7}
.desc p{margin-bottom:8px}

.apply-bar{border-top:1px solid var(--border);padding:20px 24px;background:var(--bg-alt)}
.apply-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:18px 32px;border-radius:8px;background:var(--accent);color:#fff;font-size:1rem;font-weight:800;text-decoration:none;width:100%}
.apply-btn:hover{opacity:.92}
.apply-note{text-align:center;font-size:.7rem;color:var(--muted);margin-top:8px}

.site-footer{border-top:1px solid var(--border);background:var(--bg-alt);margin-top:32px}
.footer-inner{max-width:1000px;margin:0 auto;padding:24px;text-align:center}
.footer-inner p{font-size:.65rem;color:var(--muted)}
.footer-inner a{color:var(--accent);text-decoration:none}

@media(max-width:768px){.content{padding:16px 12px 32px}.job-card h1{font-size:1.15rem;padding:18px 18px 0}.desc{padding:0 18px 18px;font-size:.85rem}}
</style>
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo">
      <img src="/assets/site-logo.png" alt="">
      <span class="logo-text">Awesome<em>Jobs</em></span>
    </a>
  </div>
</header>

<main class="content" id="app">
  <p style="text-align:center;color:var(--muted);padding:60px">Loading...</p>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <p>© 2026 <a href="/">AwesomeJobs.online</a> — Remote job board.</p>
  </div>
</footer>

<script>
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
(function(){
  var hash = window.location.hash.slice(1);
  if(!hash) { document.getElementById('app').innerHTML='<p style="text-align:center;color:var(--muted);padding:60px">No job specified. <a href="/">Browse jobs →</a></p>'; return; }
  
  fetch('/data/jobs.json?t='+Date.now(),{cache:'no-store'})
    .then(function(r){return r.json()})
    .then(function(data){
      var job = data.jobs[parseInt(hash)];
      if(!job) { document.getElementById('app').innerHTML='<p style="text-align:center;color:var(--muted);padding:60px">Job not found. <a href="/">Browse jobs →</a></p>'; return; }
      document.title = job.title+' at '+(job.company||'Company')+' — AwesomeJobs';
      render(job);
    })
    .catch(function(){
      document.getElementById('app').innerHTML='<p style="text-align:center;color:var(--muted);padding:60px">Failed to load. <a href="/">Try again →</a></p>';
    });
  
  function render(job){
    var applyUrl = job.apply_url || job.source_url || '#';
    
    var html = '<a class="back" href="javascript:history.back()">← Back to jobs</a>'+
      '<div class="job-card">'+
        '<h1>'+esc(job.title)+'</h1>'+
        '<div class="meta">'+
          '<span>🏢 '+esc(job.company||'Remote Company')+'</span>'+
          (job.location?'<span>📍 '+esc(job.location)+'</span>':'')+
          (job.salary?'<span>💰 '+esc(job.salary)+'</span>':'')+
          (job.source?'<span>via '+esc(job.source)+'</span>':'')+
        '</div>';
    
    if(job.tags && job.tags.length){
      html += '<div class="tags">'+job.tags.slice(0,8).map(function(t){
        return '<span>'+esc(t)+'</span>';
      }).join('')+'</div>';
    }
    
    if(job.description){
      html += '<div class="desc"><p>'+esc(job.description).replace(/\n/g,'<br>')+'</p></div>';
    }
    
    html += '<div class="apply-bar">'+
      '<a class="apply-btn" href="'+esc(applyUrl)+'" target="_blank" rel="noopener">Apply for this position →</a>'+
      '<p class="apply-note">You will be redirected to the employer\'s application page</p>'+
    '</div></div>';
    
    document.getElementById('app').innerHTML = html;
  }
})();
</script>
</body>
</html>
