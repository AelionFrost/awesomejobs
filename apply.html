<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){try{var t=localStorage.getItem('aj-theme');if(!t) t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Job Detail — AwesomeJobs</title>
<style>
:root{--bg:#f8fafc;--bg-alt:#f1f5f9;--surface:#fff;--text:#0f172a;--text2:#475569;--muted:#94a3b8;--border:#e2e8f0;--accent:#2563eb;--radius:10px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
[data-theme="dark"]{--bg:#0f172a;--bg-alt:#1e293b;--surface:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--muted:#64748b;--border:#334155;--accent:#3b82f6}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5}
.content{max-width:1400px;margin:0 auto;padding:40px 24px;display:flex;flex-direction:column;align-items:center}
.back{align-self:flex-start;font-size:.78rem;color:var(--muted);text-decoration:none;margin-bottom:20px}
.back:hover{color:var(--accent)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:36px;max-width:700px;width:100%;position:relative;overflow:hidden}
.card::after{content:'';position:absolute;top:0;right:0;width:48px;height:48px;background:var(--accent);clip-path:polygon(0 0,100% 0,100% 100%)}
.card h1{font-size:1.35rem;font-weight:900;margin:0 40px 4px 0;line-height:1.2}
.card .co{font-size:.85rem;font-weight:700;color:var(--text2);margin-bottom:12px}
.card .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.card .tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:.68rem;font-weight:700}
.tag.sal{background:var(--accent);color:#fff}
.tag.loc{color:var(--text2);background:var(--bg-alt)}
.tag.nosal{background:#dc2626;color:#fff}
.card .desc{font-size:.92rem;color:var(--text2);line-height:1.7;margin-bottom:24px}
.card .desc h3{font-size:.8rem;font-weight:400;letter-spacing:.02em;color:var(--text2);margin:18px 0 4px}
.card .desc p{margin-bottom:6px}
.apply-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:16px 40px;border-radius:8px;background:var(--accent);color:#fff;font-size:.95rem;font-weight:800;text-decoration:none;transition:opacity .12s;width:100%}
.card .apply:hover{opacity:.9}
.site-footer{border-top:1px solid var(--border);margin-top:60px;padding:24px;text-align:center;font-size:.65rem;color:var(--muted);max-width:1400px;margin-left:auto;margin-right:auto}
.site-footer a{color:var(--accent)}
.loading{color:var(--muted)}
</style>
</head>
<body>
<main class="content" id="app"><p class="loading">Loading...</p></main>
<footer class="site-footer">© 2026 <a href="/">AwesomeJobs.online</a></footer>
<script>
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
var hash=window.location.hash.slice(1);
if(!hash){app.innerHTML='<a class="back" href="/">← Back</a><p>No job.</p>'}
else fetch('/data/jobs.json?t='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(d=>render(d.jobs[parseInt(hash)])).catch(function(){app.innerHTML='<p>Failed.</p>'});

function render(job){
  if(!job){app.innerHTML='<a class="back" href="/">← Back</a><p>Not found.</p>';return}
  document.title=job.title+' — AwesomeJobs';
  var url=job.apply_url||job.source_url||'#';
  var tags='';
  if(job.location)tags+='<span class="tag loc">'+esc(job.location)+'</span>';
  if(job.salary)tags+='<span class="tag sal">'+esc(job.salary)+'</span>';
  else tags+='<span class="tag nosal">Salary not listed</span>';
  if(job.source)tags+='<span class="tag loc">via '+esc(job.source)+'</span>';

  var extra='';
  if(job.description){
    extra+='<h3>Description</h3><p>'+esc(job.description)+'</p>';
  }
  var info=[];
  if(job._company_industry)info.push(job._company_industry);
  if(job._company_size)info.push(job._company_size);
  if(job._company_founded)info.push('Founded '+job._company_founded);
  if(info.length)extra+='<h3>Company</h3><p>'+esc(info.join(' · '))+'</p>';
  if(job._company_about)extra+='<h3>About</h3><p>'+esc(job._company_about)+'</p>';

  app.innerHTML=
    '<a class="back" href="javascript:history.back()">← Back</a>'+
    '<div class="card">'+
      '<h1>'+esc(job.title)+'</h1>'+
      '<p class="co">'+esc(job.company||'Company')+'</p>'+
      '<div class="tags">'+tags+'</div>'+
      '<div class="desc">'+extra+'</div>'+
      '<div class="desc" id="more">Loading details...</div>'+
      '<a class="apply" href="'+esc(url)+'" target="_blank" rel="noopener">Apply →</a>'+
      '<p style="font-size:.68rem;color:var(--muted);margin-top:8px">You will be redirected to the company\'s website</p>'+
    '</div>';

  // Fetch listing text via proxy
  if(url&&url!=='#'){
    fetch('http://127.0.0.1:8910/fetch?url='+encodeURIComponent(url)).then(r=>r.json()).then(function(d){
      var more=document.getElementById('more');
      if(!more||!d.text||d.text.length<50) return;
      var lines=d.text.split('\n').filter(function(l){return l.trim().length>20});
      // Find interesting sections: Responsibilities, Requirements, Benefits
      var out='',found=0;
      for(var i=0;i<lines.length;i++){
        var l=lines[i].trim();
        if(/^(Responsibilities|Requirements|Qualifications|Benefits|Perks)/i.test(l)){
          out+='<h3>'+l.replace(/:$/,'')+'</h3>';
          found++;
        }else if(found>0&&l.length>15){
          // Max 3 sentences per line
          var sents=l.split(/\.(?=\s+[A-Z])/);
          var txt=sents.slice(0,3).join('.')+(sents.length>3?'.':'');
          out+='<p style="font-size:.92rem;color:var(--text2)">• '+esc(txt)+'</p>';
        }
      }
      if(out)more.innerHTML=out;
      else more.innerHTML='';
    }).catch(function(){});
  }
}
</script>
</body>
</html>
